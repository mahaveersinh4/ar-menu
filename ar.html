<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100dvh;overflow:hidden;background:#000;font-family:'DM Sans',sans-serif;}

/* Camera */
#cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;display:none;}

/* Loading */
#loading{
  position:fixed;inset:0;z-index:50;background:#0a0908;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  background-image:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(201,146,42,0.08) 0%,transparent 70%);
}
.ring{width:60px;height:60px;border-radius:50%;border:2px solid rgba(201,146,42,0.15);border-top-color:#c9922a;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:#e8b84b;}
.load-sub{font-size:0.72rem;color:rgba(255,255,255,0.3);letter-spacing:0.15em;text-transform:uppercase;}
.load-step{font-size:0.76rem;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:0.55rem;}
.sdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.1);flex-shrink:0;transition:background 0.3s;}
.load-step.active .sdot{background:#c9922a;animation:blink 0.7s infinite;}
.load-step.done   .sdot{background:#4caf7d;}
.load-step.fail   .sdot{background:#e05555;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* Error */
#err{position:fixed;inset:0;z-index:50;background:#0a0908;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:1rem;}
.e-icon{font-size:3rem;}
.e-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:#e8b84b;}
.e-msg{font-size:0.8rem;color:rgba(255,255,255,0.4);line-height:1.75;max-width:280px;}
.e-btn{background:linear-gradient(135deg,#c9922a,#8b6218);color:#fff;border:none;padding:0.7rem 2rem;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;margin-top:0.5rem;}

/* AR UI */
#ar-ui{position:fixed;inset:0;z-index:10;display:none;}

/* Floating dish */
.dish-wrap{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-62%);
  display:flex;flex-direction:column;align-items:center;
}
.dish-outer{
  width:min(65vw,280px);height:min(65vw,280px);
  position:relative;
}
.glow{
  position:absolute;inset:-10px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,184,75,0.18) 0%,transparent 70%);
  animation:glow 2.5s ease-in-out infinite;
}
@keyframes glow{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}

#dish-img{
  width:100%;height:100%;
  object-fit:cover;border-radius:50%;
  border:3px solid rgba(232,184,75,0.25);
  filter:drop-shadow(0 20px 40px rgba(0,0,0,0.75));
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

.dish-shadow{
  width:min(44vw,185px);height:18px;
  background:radial-gradient(ellipse,rgba(0,0,0,0.45) 0%,transparent 70%);
  border-radius:50%;margin-top:-4px;
  animation:sh 3s ease-in-out infinite;
}
@keyframes sh{0%,100%{transform:scaleX(1);opacity:0.55}50%{transform:scaleX(0.78);opacity:0.25}}

/* Top bar */
.ar-top{
  position:absolute;top:0;left:0;right:0;
  padding:0.85rem 1rem;
  background:linear-gradient(rgba(0,0,0,0.55),transparent);
  display:flex;align-items:center;justify-content:space-between;
}
.ar-logo{font-family:'Playfair Display',serif;font-size:1rem;color:#e8b84b;}
.ar-close{background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:0.32rem 0.85rem;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.7rem;cursor:pointer;}

/* Bottom */
.ar-bottom{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(8,7,5,0.97) 40%);
  padding:2.5rem 1.2rem 2rem;
  display:flex;flex-direction:column;align-items:center;gap:1rem;
}
.name-tag{
  background:rgba(10,9,8,0.8);backdrop-filter:blur(12px);
  border:1px solid rgba(232,184,75,0.3);border-radius:50px;
  padding:0.45rem 1.4rem;text-align:center;
}
.nt-name{font-family:'Playfair Display',serif;font-size:1.1rem;color:#e8b84b;display:block;}
.nt-price{font-size:0.68rem;color:rgba(255,255,255,0.4);display:block;margin-top:0.05rem;}

/* 360 slider */
.rot-wrap{width:100%;max-width:300px;}
.rot-label{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.25);text-align:center;margin-bottom:0.5rem;}
.rot-row{display:flex;align-items:center;gap:0.7rem;}
.rot-row span{font-size:0.9rem;color:#c9922a;}
input#rot{-webkit-appearance:none;flex:1;height:3px;border-radius:3px;outline:none;cursor:pointer;background:rgba(255,255,255,0.12);}
input#rot::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#e8b84b,#c9922a);box-shadow:0 2px 10px rgba(201,146,42,0.45);}

/* Toast */
#toast{position:fixed;top:4.5rem;left:50%;transform:translateX(-50%);background:rgba(10,9,8,0.9);border:1px solid rgba(201,146,42,0.3);color:#f0ece4;padding:0.5rem 1.2rem;border-radius:50px;font-size:0.75rem;z-index:99;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>

<!-- Loading -->
<div id="loading">
  <div class="ring"></div>
  <div class="load-title">✦ AR Menu</div>
  <div class="load-sub">Loading experience</div>
  <div class="load-step" id="s1"><div class="sdot"></div>Dish data load...</div>
  <div class="load-step" id="s2"><div class="sdot"></div>Camera start...</div>
  <div class="load-step" id="s3"><div class="sdot"></div>AR ready...</div>
</div>

<!-- Error -->
<div id="err">
  <div class="e-icon" id="e-icon">⚠️</div>
  <div class="e-title" id="e-title">Error</div>
  <div class="e-msg"  id="e-msg">Kuch galat hua.</div>
  <button class="e-btn" onclick="location.reload()">🔄 Try Again</button>
</div>

<!-- AR UI -->
<div id="ar-ui">
  <div class="ar-top">
    <div class="ar-logo">✦ AR Menu</div>
    <button class="ar-close" onclick="stopCam()">✕ Close</button>
  </div>

  <div class="dish-wrap">
    <div class="dish-outer">
      <div class="glow"></div>
      <img id="dish-img" src="" alt="dish">
    </div>
    <div class="dish-shadow"></div>
  </div>

  <div class="ar-bottom">
    <div class="name-tag">
      <span class="nt-name"  id="nt-name">—</span>
      <span class="nt-price" id="nt-price">—</span>
    </div>
    <div class="rot-wrap">
      <div class="rot-label">🔄 360° Rotate Dish</div>
      <div class="rot-row">
        <span>↺</span>
        <input type="range" id="rot" min="0" max="360" value="0">
        <span>↻</span>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let camStream = null;

// ── HELPERS ──
function ss(id, state) {
  const el = document.getElementById(id);
  if (el) el.className = 'load-step ' + state;
}
function showErr(icon, title, msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('err').style.display = 'flex';
  document.getElementById('e-icon').textContent  = icon;
  document.getElementById('e-title').textContent = title;
  document.getElementById('e-msg').textContent   = msg;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── READ DISH ID FROM URL ──
// QR contains: https://user.github.io/repo/ar.html?id=dish_1234
ss('s1', 'active');

const params = new URLSearchParams(window.location.search);
const dishId = params.get('id');

if (!dishId) {
  showErr('📵', 'QR Invalid', 'Yeh QR sahi nahi hai.\nRestaurant staff se naya QR maango.');
} else {
  loadDish(dishId);
}

// ── LOAD DISH FROM dishes.json on GitHub ──
async function loadDish(id) {
  try {
    // Get GitHub owner from current URL
    // URL: https://USERNAME.github.io/REPO/ar.html
    const host  = window.location.hostname; // USERNAME.github.io
    const user  = host.split('.')[0];
    const repo  = window.location.pathname.split('/')[1]; // /REPO/ar.html

    // Fetch dishes.json — with cache-bust so latest version loads
    const jsonURL = `https://${user}.github.io/${repo}/dishes.json?t=${Date.now()}`;
    const res = await fetch(jsonURL);

    if (!res.ok) throw new Error('dishes.json nahi mila — admin panel se dish add karo pehle');

    const dishes = await res.json();
    const dish   = dishes.find(d => d.id === id);

    if (!dish) throw new Error('Yeh dish nahi mili. Shayad delete ho gayi.');

    // Set dish info
    document.getElementById('dish-img').src    = dish.imgURL;
    document.getElementById('nt-name').textContent  = dish.name;
    document.getElementById('nt-price').textContent = dish.price + (dish.desc ? ' • ' + dish.desc : '');

    ss('s1', 'done');
    startCamera(dish.name);

  } catch(e) {
    ss('s1', 'fail');
    showErr('🍽', 'Dish Load Failed', e.message);
  }
}

// ── START CAMERA ──
async function startCamera(dishName) {
  ss('s2', 'active');
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const vid = document.getElementById('cam');
    vid.srcObject = camStream;
    await vid.play();
    ss('s2', 'done');
    ss('s3', 'active');

    setTimeout(() => {
      ss('s3', 'done');
      vid.style.display = 'block';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('ar-ui').style.display   = 'block';
        toast('✨ ' + dishName + ' AR mein aa gaya!');
      }, 300);
    }, 600);

  } catch(e) {
    ss('s2', 'fail');
    let msg = 'Camera permission allow karo:\nAddress bar → 🔒 → Camera → Allow → Reload';
    if (e.name === 'NotFoundError')   msg = 'Is device pe koi camera nahi mila.';
    if (e.name === 'NotAllowedError') msg = 'Camera permission deny hai.\nSettings → Camera → Allow → Reload';
    showErr('📷', 'Camera Nahi Mili', msg);
  }
}

// ── 360 ROTATION ──
// Combine rotation with float animation using CSS
const dishImgEl = document.getElementById('dish-img');
let currentRot  = 0;
let floatAnim   = true; // track if float is in "up" phase

document.getElementById('rot').addEventListener('input', function() {
  currentRot = parseInt(this.value);
  // Override animation temporarily, apply rotation
  dishImgEl.style.animation = 'none';
  dishImgEl.style.transform = `translateY(0) rotate(${currentRot}deg)`;
  // Re-enable float after 100ms
  clearTimeout(window._rotTimer);
  window._rotTimer = setTimeout(() => {
    dishImgEl.style.animation = '';
    dishImgEl.style.transform = '';
    dishImgEl.style.setProperty('--rot', currentRot + 'deg');
  }, 150);
});

// ── STOP CAM ──
function stopCam() {
  if (camStream) camStream.getTracks().forEach(t => t.stop());
  history.back();
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden && camStream) camStream.getTracks().forEach(t => t.stop());
});
</script>
</body>
</html>
