<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Jost',sans-serif; }

/* Loading */
#loading {
  position:fixed; inset:0; z-index:100; background:#0f0e0c;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem;
  background-image:radial-gradient(ellipse 80% 50% at 50% 30%, rgba(184,134,11,0.1) 0%, transparent 70%);
}
.load-ring {
  width:64px; height:64px; border-radius:50%;
  border:2px solid rgba(218,165,32,0.2); border-top-color:#daa520;
  animation:spin 1s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.load-title { font-family:'Cormorant Garamond',serif; font-size:1.6rem; color:#daa520; }
.load-msg { font-size:0.72rem; color:rgba(255,255,255,0.4); letter-spacing:0.12em; text-transform:uppercase; text-align:center; max-width:260px; line-height:1.6; }
.load-step { font-size:0.78rem; color:rgba(255,255,255,0.5); display:flex; align-items:center; gap:0.6rem; margin-top:0.3rem; }
.load-step .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.15); flex-shrink:0; transition:background 0.3s; }
.load-step.active .dot { background:#daa520; animation:pd 0.8s infinite; }
.load-step.done .dot { background:#4caf50; }
@keyframes pd { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Error */
#error-screen {
  position:fixed; inset:0; z-index:100; background:#0f0e0c;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  padding:2rem; text-align:center; gap:1rem;
}
.err-icon { font-size:3rem; }
.err-title { font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:#daa520; }
.err-msg { font-size:0.82rem; color:rgba(255,255,255,0.5); line-height:1.7; max-width:300px; }
.err-btn { background:linear-gradient(135deg,#b8860b,#8b6914); color:#fff; border:none; padding:0.75rem 2rem; border-radius:50px; font-family:'Jost',sans-serif; font-size:0.88rem; cursor:pointer; margin-top:0.5rem; }

/* AR scene */
#ar-wrap { position:fixed; inset:0; z-index:1; display:none; }

/* Top bar */
#topbar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  padding:0.8rem 1rem;
  background:linear-gradient(rgba(0,0,0,0.6),transparent);
  display:none; align-items:center; justify-content:space-between;
}
.tb-title { font-family:'Cormorant Garamond',serif; font-size:1rem; color:#daa520; }
.tb-close {
  background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15);
  color:#fff; padding:0.35rem 0.85rem; border-radius:50px;
  font-family:'Jost',sans-serif; font-size:0.72rem; cursor:pointer;
}

/* Scan hint */
#scan-hint {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  background:linear-gradient(transparent, rgba(0,0,0,0.88));
  padding:4rem 1.5rem 2.5rem;
  display:none; flex-direction:column; align-items:center; gap:0.8rem;
  transition:opacity 0.5s;
}
.hint-box {
  border:1.5px solid rgba(218,165,32,0.5); border-radius:12px;
  padding:0.6rem 1.5rem; font-size:0.78rem; color:rgba(255,255,255,0.75);
  letter-spacing:0.08em; text-align:center;
  animation:hpulse 2s ease-in-out infinite;
  display:flex; align-items:center; gap:0.5rem;
}
@keyframes hpulse { 0%,100%{opacity:0.7;border-color:rgba(218,165,32,0.3)} 50%{opacity:1;border-color:rgba(218,165,32,0.8)} }

/* Dish UI (when target found) */
#dish-ui {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  background:linear-gradient(transparent, rgba(8,7,5,0.97) 35%);
  padding:3rem 1.2rem 1.8rem;
  display:none; flex-direction:column; align-items:center; gap:1rem;
}
.dish-tag {
  background:rgba(15,14,12,0.85); backdrop-filter:blur(14px);
  border:1px solid rgba(218,165,32,0.4); border-radius:50px;
  padding:0.5rem 1.6rem; text-align:center;
}
.dt-name { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:#daa520; display:block; }
.dt-price { font-size:0.72rem; color:rgba(255,255,255,0.5); display:block; margin-top:0.1rem; }

/* Slider */
.rot-wrap { width:100%; max-width:320px; }
.rot-lbl { font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.3); text-align:center; margin-bottom:0.5rem; }
.rot-row { display:flex; align-items:center; gap:0.8rem; }
.rot-row span { font-size:0.9rem; color:#daa520; }
input#rot {
  -webkit-appearance:none; flex:1; height:3px; border-radius:3px;
  outline:none; cursor:pointer; background:rgba(255,255,255,0.15);
}
input#rot::-webkit-slider-thumb {
  -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
  background:linear-gradient(135deg,#daa520,#b8860b);
  box-shadow:0 2px 10px rgba(184,134,11,0.5);
}

/* Actions */
.ar-actions { display:flex; gap:0.6rem; flex-wrap:wrap; justify-content:center; }
.ar-btn {
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);
  color:#faf7f2; padding:0.6rem 1rem; border-radius:50px;
  font-family:'Jost',sans-serif; font-size:0.78rem; cursor:pointer;
  display:flex; align-items:center; gap:0.35rem; transition:all 0.2s;
}
.ar-btn:hover { background:rgba(184,134,11,0.2); border-color:#b8860b; }
.ar-btn.order { background:linear-gradient(135deg,#b8860b,#8b6914); border-color:transparent; font-weight:500; }

/* Toast */
#toast {
  position:fixed; top:4.5rem; left:50%; transform:translateX(-50%);
  background:rgba(15,14,12,0.92); border:1px solid rgba(184,134,11,0.4);
  color:#faf7f2; padding:0.55rem 1.3rem; border-radius:50px;
  font-size:0.78rem; z-index:999; opacity:0; transition:opacity 0.3s;
  pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="load-ring"></div>
  <div class="load-title">✦ AR Menu</div>
  <div class="load-msg" id="load-msg">Data load ho raha hai...</div>
  <div class="load-step" id="s1"><div class="dot"></div> Dish data load...</div>
  <div class="load-step" id="s2"><div class="dot"></div> Camera start...</div>
  <div class="load-step" id="s3"><div class="dot"></div> AR engine ready...</div>
</div>

<!-- ERROR -->
<div id="error-screen">
  <div class="err-icon" id="err-icon">⚠️</div>
  <div class="err-title" id="err-title">Error</div>
  <div class="err-msg" id="err-msg">Kuch galat ho gaya.</div>
  <button class="err-btn" onclick="location.reload()">🔄 Dobara Try Karo</button>
</div>

<!-- AR SCENE (injected) -->
<div id="ar-wrap"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tb-title">✦ AR Menu</div>
  <button class="tb-close" onclick="history.back()">✕ Close</button>
</div>

<!-- SCAN HINT -->
<div id="scan-hint">
  <div class="hint-box">📷 &nbsp; Restaurant logo / menu card pe point karo</div>
</div>

<!-- DISH UI -->
<div id="dish-ui">
  <div class="dish-tag">
    <span class="dt-name" id="ui-name">—</span>
    <span class="dt-price" id="ui-price">—</span>
  </div>
  <div class="rot-wrap">
    <div class="rot-lbl">🔄 360° Rotate Dish</div>
    <div class="rot-row">
      <span>↺</span>
      <input type="range" id="rot" min="0" max="360" value="0" oninput="rotateDish(this.value)">
      <span>↻</span>
    </div>
  </div>
  <div class="ar-actions">
    <button class="ar-btn" onclick="takePhoto()">📸 Photo</button>
    <button class="ar-btn order" onclick="orderNow()">🛒 Order Now</button>
    <button class="ar-btn" onclick="sharePage()">↗ Share</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DECODE DISH FROM URL HASH ──
let dish = null;
let targetImgData = null;

function step(id, state) {
  const el = document.getElementById(id);
  if (el) el.className = 'load-step ' + state;
}

function showError(icon, title, msg) {
  document.getElementById('loading').style.display = 'none';
  const es = document.getElementById('error-screen');
  es.style.display = 'flex';
  document.getElementById('err-icon').textContent = icon;
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
}

// Decode URL hash
step('s1', 'active');
try {
  const hash = window.location.hash.slice(1); // remove #
  if (!hash) throw new Error('No data in URL');

  const decoded = decodeURIComponent(escape(atob(hash)));
  const payload = JSON.parse(decoded);

  dish = {
    name: payload.n,
    price: payload.p,
    desc: payload.d,
    img: payload.i
  };
  targetImgData = payload.t;

  if (!dish.name || !dish.img || !targetImgData) throw new Error('Incomplete data');

  step('s1', 'done');
  document.getElementById('load-msg').textContent = 'Camera start ho rahi hai...';
  step('s2', 'active');

  // Set dish info
  document.getElementById('ui-name').textContent = dish.name;
  document.getElementById('ui-price').textContent = dish.price + (dish.desc ? ' • ' + dish.desc : '');

  initAR();
} catch(e) {
  showError('📵', 'QR Code Invalid', 'Yeh QR code sahi nahi hai ya expire ho gaya. Restaurant staff se naya QR maango.');
}

// ── INIT AR ──
async function initAR() {
  // Camera check
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    stream.getTracks().forEach(t => t.stop()); // release immediately, MindAR will open it again
    step('s2', 'done');
    step('s3', 'active');
  } catch(e) {
    showError('📷', 'Camera Access Denied', 'Apne browser mein camera permission allow karo, phir page reload karo.');
    return;
  }

  // Convert base64 images to blob URLs
  const targetBlobURL = base64ToBlobURL(targetImgData, 'image/jpeg');
  const dishBlobURL = base64ToBlobURL(dish.img, 'image/jpeg');

  buildScene(targetBlobURL, dishBlobURL);
}

function base64ToBlobURL(dataURL, type) {
  const arr = dataURL.split(',');
  const mime = arr[0].match(/:(.*?);/)?.[1] || type;
  const bstr = atob(arr[1]);
  const u8arr = new Uint8Array(bstr.length);
  for (let i = 0; i < bstr.length; i++) u8arr[i] = bstr.charCodeAt(i);
  const blob = new Blob([u8arr], { type: mime });
  return URL.createObjectURL(blob);
}

// ── BUILD A-FRAME SCENE ──
function buildScene(targetURL, dishImgURL) {
  const wrap = document.getElementById('ar-wrap');
  wrap.innerHTML = `
    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: ${targetURL}; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="position:fixed;inset:0;width:100%;height:100%;">

      <a-assets>
        <img id="dish-img" src="${dishImgURL}" crossorigin="anonymous">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <!-- Shadow ellipse on target surface -->
        <a-ellipse
          position="0 0.01 0.005"
          semi-minor-axis="0.38" semi-major-axis="0.44"
          rotation="-90 0 0"
          color="#000" opacity="0.3">
        </a-ellipse>

        <!-- Glow ring -->
        <a-torus
          position="0 0.015 0"
          radius="0.28" radius-tubular="0.012"
          rotation="-90 0 0"
          color="#daa520" opacity="0.35"
          animation="property:scale; from:1 1 1; to:1.1 1.1 1.1; dur:1800; dir:alternate; loop:true; easing:easeInOutSine;">
        </a-torus>

        <!-- Dish image floating above target -->
        <a-image
          id="ar-dish"
          src="#dish-img"
          position="0 0.5 0"
          width="0.9" height="0.9"
          rotation="0 0 0"
          animation="property:position; from:0 0.46 0; to:0 0.54 0; dur:2200; dir:alternate; loop:true; easing:easeInOutSine;">
        </a-image>

      </a-entity>
    </a-scene>
  `;

  const scene = document.getElementById('ar-scene');
  wrap.style.display = 'block';

  scene.addEventListener('arReady', () => {
    step('s3', 'done');
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('topbar').style.display = 'flex';
      document.getElementById('scan-hint').style.display = 'flex';
    }, 500);
    toast('📷 Restaurant logo pe camera point karo');
  });

  scene.addEventListener('arError', () => {
    showError('⚠️', 'AR Error', 'AR start nahi hua. HTTPS connection check karo aur Chrome use karo.');
  });

  scene.addEventListener('targetFound', () => {
    document.getElementById('scan-hint').style.opacity = '0';
    document.getElementById('dish-ui').style.display = 'flex';
    toast('✨ ' + dish.name + ' AR mein aa gaya!');
  });

  scene.addEventListener('targetLost', () => {
    document.getElementById('scan-hint').style.opacity = '1';
    document.getElementById('dish-ui').style.display = 'none';
    document.getElementById('rot').value = 0;
  });
}

// ── ROTATE ──
function rotateDish(val) {
  const el = document.getElementById('ar-dish');
  if (el) el.setAttribute('rotation', `0 ${val} 0`);
}

// ── ACTIONS ──
function takePhoto() {
  const canvas = document.querySelector('canvas');
  if (canvas) {
    try {
      const a = document.createElement('a');
      a.download = dish.name + '-AR.jpg';
      a.href = canvas.toDataURL('image/jpeg', 0.9);
      a.click();
      toast('📸 Photo save ho gayi!');
      return;
    } catch(e) {}
  }
  toast('📸 Screenshot lo (Power + Volume Down)');
}

function orderNow() {
  toast('🛒 ' + dish.name + ' order mein add ho gaya!');
}

function sharePage() {
  if (navigator.share) {
    navigator.share({ title: dish.name, url: window.location.href }).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(window.location.href)
      .then(() => toast('🔗 Link copy ho gaya!'))
      .catch(() => toast('🔗 URL copy karo: ' + window.location.href));
  }
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
